<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12365c"/>
      <stop offset="1" stop-color="#071322"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#sheen)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#3b6ea8" stroke-width="6" opacity="0.55"/>
  <!-- chip pins: fewer + fatter so they survive 48px -->
  <g stroke="#7fb2e6" stroke-width="22" stroke-linecap="round" opacity="0.9">
    <line x1="176" y1="92" x2="176" y2="126"/><line x1="256" y1="92" x2="256" y2="126"/><line x1="336" y1="92" x2="336" y2="126"/>
    <line x1="176" y1="386" x2="176" y2="420"/><line x1="256" y1="386" x2="256" y2="420"/><line x1="336" y1="386" x2="336" y2="420"/>
    <line x1="92" y1="176" x2="126" y2="176"/><line x1="92" y1="256" x2="126" y2="256"/><line x1="92" y1="336" x2="126" y2="336"/>
    <line x1="386" y1="176" x2="420" y2="176"/><line x1="386" y1="256" x2="420" y2="256"/><line x1="386" y1="336" x2="420" y2="336"/>
  </g>
  <!-- chip body -->
  <rect x="124" y="124" width="264" height="264" rx="36" fill="#0d1b2c" stroke="#5e97d0" stroke-width="12"/>
  <!-- BIG play arrow, top-left of the die -->
  <path d="M 170 162 L 170 250 L 248 206 Z" fill="#ffffff"/>
  <!-- vendor benchmark bars, larger -->
  <g>
    <rect x="164" y="286" width="52" height="70" rx="12" fill="#2a7de1"/>
    <rect x="232" y="248" width="52" height="108" rx="12" fill="#e0393e"/>
    <rect x="300" y="172" width="52" height="184" rx="12" fill="#76b900"/>
  </g>
</svg>
